<!-- v2.4 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cardano TX Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --surface: #131929;
      --surface2: #1a2236;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #e8eaf0;
      --muted: #7b859e;
      --accent: #0cd9a0;
      --accent-dim: rgba(12,217,160,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,0.12);
      --blue: #60a5fa;
      --mono: 'JetBrains Mono', 'Fira Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header .logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    header .logo svg { width: 16px; height: 16px; }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    header span { font-size: 13px; color: var(--muted); margin-left: 4px; }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    .search-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .search-card h2 {
      font-size: 14px; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem;
    }
    .field { margin-bottom: 0.75rem; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .field input {
      width: 100%; background: var(--bg); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit;
      padding: 10px 14px; outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }
    .search-row { display: flex; gap: 10px; margin-top: 1rem; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #051510;
      font-size: 14px; font-weight: 600; border: none;
      border-radius: 8px; padding: 10px 20px;
      cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border2); font-weight: 500;
    }
    .btn-ghost:hover { color: var(--text); opacity: 1; background: var(--surface2); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    #status { font-size: 13px; color: var(--muted); margin-top: 0.75rem; min-height: 20px; }
    #status.error { color: var(--red); }

    /* Hide number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .utxo-addr {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      word-break: break-all; cursor: pointer; transition: color 0.15s;
    }
    .utxo-addr:hover { color: var(--accent); text-decoration: underline; }

    .label-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--accent-dim); color: var(--accent);
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 99px; white-space: nowrap; cursor: default;
    }
    .label-chip.yellow { background: var(--amber-dim); color: var(--amber); }
    .label-chip.blue   { background: rgba(96,165,250,0.12); color: var(--blue); }
    .label-chip.red    { background: var(--red-dim); color: var(--red); }

    /* Popup */
    .popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .popup-overlay.open { display: flex; }
    .popup {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 14px; padding: 1.5rem; width: 480px; max-width: 94vw;
    }
    .popup h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .popup .popup-addr {
      font-family: var(--mono); font-size: 10.5px; color: var(--muted);
      word-break: break-all; margin-bottom: 1rem; line-height: 1.5;
    }
    .popup input {
      width: 100%; background: var(--bg); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text); font-size: 14px;
      padding: 10px 14px; outline: none; margin-bottom: 1rem;
      transition: border-color 0.15s;
    }
    .popup input:focus { border-color: var(--accent); }
    .popup-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .popup-remove {
      margin-right: auto; background: transparent; color: var(--red);
      border: 1px solid var(--red-dim); font-size: 13px; font-weight: 500;
      border-radius: 8px; padding: 8px 14px; cursor: pointer;
    }
    .popup-remove:hover { background: var(--red-dim); }

    /* Meta */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px; margin-bottom: 1.5rem;
    }
    .metric {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
    }
    .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .metric-value { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    .metric-value.ada::after { content: ' ₳'; font-size: 14px; font-weight: 400; color: var(--muted); }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .section-header h3 { font-size: 14px; font-weight: 500; color: var(--muted); }

    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    thead { background: var(--surface2); }
    th {
      padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 500;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .col-hash    { width: 16%; }
    .col-inputs  { width: 42%; }
    .col-outputs { width: 42%; }

    .utxo-col-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px; }
    .utxo-list { display: flex; flex-direction: column; gap: 6px; }
    .utxo-entry { display: flex; flex-direction: column; gap: 2px; }
    .utxo-entry.hidden { display: none; }
    .utxo-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .utxo-ada { font-family: var(--mono); font-size: 12px; color: var(--text); white-space: nowrap; flex-shrink: 0; }
    .utxo-expand-btn {
      margin-top: 4px; background: none; border: none; padding: 0;
      font-size: 11px; color: var(--accent); cursor: pointer; text-align: left;
    }
    .utxo-expand-btn:hover { text-decoration: underline; }

    .hash-cell { font-family: var(--mono); font-size: 11px; }
    .hash-cell a { color: var(--blue); text-decoration: none; }
    .hash-cell a:hover { text-decoration: underline; }

    .trade-add-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; margin-left: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 4px; color: var(--muted); font-size: 13px; line-height: 1;
      cursor: pointer; vertical-align: middle; transition: all 0.15s; flex-shrink: 0;
    }
    .trade-add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .trade-add-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .pagination { display: flex; align-items: center; gap: 10px; margin-top: 1rem; justify-content: center; }
    .pagination span { font-size: 13px; color: var(--muted); }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #results { display: none; }

    footer {
      text-align: center; padding: 2rem; font-size: 12px;
      color: var(--muted); border-top: 1px solid var(--border); margin-top: 3rem;
    }

    @media (max-width: 700px) {
      .col-outputs { display: none; }
      .col-hash { width: 28%; } .col-inputs { width: 72%; }
      main { padding: 1rem 1rem 3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 16 16" fill="#051510" xmlns="http://www.w3.org/2000/svg">
      <circle cx="8" cy="4" r="2.5"/>
      <circle cx="3" cy="12" r="2.5"/>
      <circle cx="13" cy="12" r="2.5"/>
      <line x1="8" y1="6.5" x2="4.2" y2="10" stroke="#051510" stroke-width="1.5"/>
      <line x1="8" y1="6.5" x2="11.8" y2="10" stroke="#051510" stroke-width="1.5"/>
    </svg>
  </div>
  <h1>Cardano TX Explorer <span>mainnet</span></h1>
</header>

<main>
  <!-- Label popup -->
  <div class="popup-overlay" id="popup-overlay" onclick="closePopup(event)">
    <div class="popup">
      <h3>Label address</h3>
      <div class="popup-addr" id="popup-addr"></div>
      <input id="popup-input" type="text" placeholder="Enter a label…" />
      <div class="popup-btns">
        <button class="popup-remove" id="popup-remove" onclick="removeLabel()">Remove label</button>
        <button class="btn btn-ghost" onclick="closePopup()">Cancel</button>
        <button class="btn" onclick="saveLabel()">Save</button>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-card">
    <h2>Lookup</h2>
    <div class="field">
      <label>Stake address</label>
      <input id="stake" type="text" placeholder="stake1u..." />
    </div>
    <div class="search-row">
      <button class="btn" id="search-btn" onclick="fetchAccount()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Search
      </button>
    </div>
    <div id="status"></div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="meta-grid" id="meta-grid"></div>
    <div class="section-header">
      <h3 id="tx-count-label">Transactions</h3>
      <button class="btn btn-ghost" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
    <div id="portfolio-sidebar" style="display:none; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin-bottom:1rem;">
      <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); margin-bottom:0.75rem;">Portfolio Tracker</div>
      <div id="portfolio-list"></div>
      <div id="portfolio-total" style="margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid var(--border); font-size:13px; display:flex; flex-direction:column; gap:6px;">
        <div style="display:flex; justify-content:space-between;"><span style="color:var(--muted);">Total deposited</span><span id="pt-deposited" style="font-family:var(--mono); color:var(--accent);">0</span></div>
        <div style="display:flex; justify-content:space-between;"><span style="color:var(--muted);">Total withdrawn</span><span id="pt-withdrawn" style="font-family:var(--mono); color:var(--red);">0</span></div>
        <div style="display:flex; justify-content:space-between;"><span style="color:var(--muted);">Net</span><span id="pt-net" style="font-family:var(--mono); font-weight:600;">0</span></div>
        <div id="pt-usd-row" style="display:none; justify-content:space-between;"><span style="color:var(--muted);">Value in USD</span><span id="pt-usd" style="font-family:var(--mono); font-weight:600;"></span></div>
      </div>
    </div>
    <div id="trades-sidebar" style="display:none; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; margin-bottom:1rem;">
      <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); margin-bottom:0.75rem;">Trades</div>
      <div id="trades-list"></div>
    </div>
    <div style="display:flex; gap:1rem; align-items:flex-start;">
      <div style="display:flex; flex-direction:column; gap:1rem; flex-shrink:0; width:220px;">
        <div id="labels-sidebar" style="display:none; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem;">
          <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); margin-bottom:0.75rem;">Labels</div>
          <div id="labels-list"></div>
        </div>
      </div>
      <div style="flex:1; min-width:0;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="col-hash">TX Hash</th>
                <th class="col-inputs">Inputs</th>
                <th class="col-outputs">Outputs</th>
              </tr>
            </thead>
            <tbody id="tx-body"></tbody>
          </table>
        </div>
      </div>

    <div class="pagination" id="pagination"></div>
  </div>
</main>

<footer>
  Powered by <a href="https://blockfrost.io" style="color:var(--accent);text-decoration:none">Blockfrost</a> · Data is read-only
</footer>

<script>
const BASE    = 'https://cardano-mainnet.blockfrost.io/api/v0';
const API_KEY = 'mainnettuskMeFpliyx52DukVDywVSJ9e5kUCqb';

let allTxs      = [];
let currentPage = 1;
const PAGE_SIZE = 25;

// labels: Map<address, { name, color }>
const labels = new Map();
const CHIP_CLASSES = ['', 'yellow', 'blue', 'red'];
let colorIdx = 0;

let popupAddr = null;

// ── Popup ──────────────────────────────────────────────────────────
function openPopup(addr) {
  popupAddr = addr;
  document.getElementById('popup-addr').textContent = addr;
  const existing = labels.get(addr);
  document.getElementById('popup-input').value = existing ? existing.name : '';
  document.getElementById('popup-remove').style.display = existing ? 'block' : 'none';
  document.getElementById('popup-overlay').classList.add('open');
  setTimeout(() => document.getElementById('popup-input').focus(), 50);
}

function closePopup(e) {
  if (e && e.target !== document.getElementById('popup-overlay')) return;
  document.getElementById('popup-overlay').classList.remove('open');
  popupAddr = null;
}

function renderLabels() {
  const sidebar = document.getElementById('labels-sidebar');
  const list    = document.getElementById('labels-list');
  if (labels.size === 0) { sidebar.style.display = 'none'; return; }
  sidebar.style.display = 'block';
  list.innerHTML = [...labels.entries()].map(([addr, lbl]) => `
    <div style="margin-bottom:0.75rem; padding-bottom:0.75rem; border-bottom:1px solid var(--border);">
      <div style="margin-bottom:4px;">
        <span class="label-chip ${lbl.color}" style="cursor:pointer" data-addr="${escHtml(addr)}">${escHtml(lbl.name)}</span>
      </div>
      <div style="font-family:var(--mono); font-size:10px; color:var(--muted); word-break:break-all;">${escHtml(addr)}</div>
    </div>`
  ).join('');
  // clicking a chip in the sidebar opens the popup too
  list.querySelectorAll('.label-chip').forEach(el => {
    el.addEventListener('click', () => openPopup(el.dataset.addr));
  });
}

function saveLabel() {
  const name = document.getElementById('popup-input').value.trim();
  if (!popupAddr) return;
  if (name) {
    const existing = labels.get(popupAddr);
    const color = existing ? existing.color : CHIP_CLASSES[colorIdx++ % CHIP_CLASSES.length];
    labels.set(popupAddr, { name, color });
  } else {
    labels.delete(popupAddr);
  }
  document.getElementById('popup-overlay').classList.remove('open');
  popupAddr = null;
  renderTable();
  renderLabels();
}

function removeLabel() {
  if (popupAddr) labels.delete(popupAddr);
  document.getElementById('popup-overlay').classList.remove('open');
  popupAddr = null;
  renderTable();
  renderLabels();
}

// Enter key saves
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { document.getElementById('popup-overlay').classList.remove('open'); popupAddr = null; }
  if (e.key === 'Enter' && document.getElementById('popup-overlay').classList.contains('open')) saveLabel();
});

// ── Utilities ──────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function lovelace(l) { return parseInt(l || 0) / 1_000_000; }
function fmt(n, dec = 2) {
  return n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function setStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = isErr ? 'error' : '';
}

// ── Blockfrost ─────────────────────────────────────────────────────
async function bf(path) {
  const r = await fetch(BASE + path, { headers: { project_id: API_KEY } });
  if (!r.ok) {
    const j = await r.json().catch(() => ({}));
    throw new Error(j.message || `HTTP ${r.status}`);
  }
  return r.json();
}

async function fetchAllTxs(stake) {
  const batch = await bf(`/accounts/${stake}/transactions?count=100&page=1&order=desc`);
  // deduplicate by tx_hash (Blockfrost can return the same tx multiple times)
  const seen = new Set();
  return batch.filter(t => {
    if (seen.has(t.tx_hash)) return false;
    seen.add(t.tx_hash);
    return true;
  }).slice(0, 50);
}

async function fetchAccount() {
  const stake = document.getElementById('stake').value.trim();
  if (!stake) return setStatus('Enter a stake address.', true);

  document.getElementById('results').style.display = 'none';
  document.getElementById('search-btn').disabled = true;
  setStatus('<span class="spinner"></span> Fetching account…');

  try {
    const [acct, txList, ownAddrs] = await Promise.all([
      bf(`/accounts/${stake}`),
      fetchAllTxs(stake),
      bf(`/accounts/${stake}/addresses?count=100`).catch(() => [])
    ]);

    // auto-label own addresses
    ownAddrs.forEach(a => {
      if (!labels.has(a.address)) {
        const color = CHIP_CLASSES[colorIdx++ % CHIP_CLASSES.length];
        labels.set(a.address, { name: 'My Wallet', color });
      }
    });

    setStatus(`<span class="spinner"></span> Fetching UTxOs for ${txList.length} transactions…`);

    const chunks = [];
    for (let i = 0; i < txList.length; i += 10) chunks.push(txList.slice(i, i + 10));

    const details = [];
    for (const chunk of chunks) {
      const res = await Promise.all(chunk.map(t => bf(`/txs/${t.tx_hash}`).catch(() => null)));
      details.push(...res);
    }

    const utxos = [];
    for (const chunk of chunks) {
      const res = await Promise.all(chunk.map(t => bf(`/txs/${t.tx_hash}/utxos`).catch(() => null)));
      utxos.push(...res);
    }

    allTxs = txList.map((t, i) => {
      const d = details[i];
      const u = utxos[i];
      return {
        hash:    t.tx_hash,
        time:    t.block_time,
        block:   t.block_height,
        fees:    d?.fees || 0,
        inputs:  u ? u.inputs  : [],
        outputs: u ? u.outputs : []
      };
    });

    renderMeta(acct, txList.length);
    currentPage = 1;
    renderTable();
    setStatus('');
    document.getElementById('results').style.display = 'block';

  } catch (e) {
    setStatus('Error: ' + e.message, true);
  } finally {
    document.getElementById('search-btn').disabled = false;
  }
}

// ── Render ─────────────────────────────────────────────────────────
function renderMeta(acct, count) {
  const pool = acct.pool_id ? acct.pool_id.slice(0, 12) + '…' : 'Not delegating';
  const cards = [
    { label: 'Controlled ADA',       value: fmt(lovelace(acct.controlled_amount)),   ada: true  },
    { label: 'Rewards available',    value: fmt(lovelace(acct.withdrawable_amount)), ada: true  },
    { label: 'Total rewards earned', value: fmt(lovelace(acct.rewards_sum)),         ada: true  },
    { label: 'Total deposits',       value: fmt(lovelace(acct.deposits_sum)),        ada: true  },
    { label: 'Transactions',         value: count.toLocaleString(),                  ada: false },
    { label: 'Stake pool',           value: pool,                                    ada: false },
  ];
  document.getElementById('meta-grid').innerHTML = cards.map(c =>
    `<div class="metric">
      <div class="metric-label">${c.label}</div>
      <div class="metric-value${c.ada ? ' ada' : ''}">${c.value}</div>
    </div>`
  ).join('');
  document.getElementById('tx-count-label').textContent = `${count.toLocaleString()} transactions`;
}

const COLLAPSE_THRESHOLD = 5;

function formatAssetName(hex) {
  try {
    const bytes = hex.match(/.{1,2}/g).map(b => parseInt(b, 16));
    const str = String.fromCharCode(...bytes);
    if (/^[\x20-\x7E]+$/.test(str)) return str;
  } catch {}
  return 'null';
}

function fmt4sig(n) {
  if (n === 0) return '0';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  const tiers = [
    [1e12, 't'],
    [1e9,  'b'],
    [1e6,  'm'],
    [1e3,  'k'],
    [1,    '' ],
  ];
  for (const [div, suffix] of tiers) {
    if (abs >= div) {
      const val = abs / div;
      // 4 significant figures, strip trailing zeros
      const str = parseFloat(val.toPrecision(4)).toString();
      return sign + str + suffix;
    }
  }
  return String(n);
}

function tokenRows(amounts) {
  const tokens = (amounts || []).filter(a => a.unit !== 'lovelace');
  if (!tokens.length) return '';
  return tokens.map(t => {
    const qty      = fmt4sig(parseInt(t.quantity));
    const policyId = t.unit.slice(0, 56);
    const nameHex  = t.unit.slice(56);
    const name     = nameHex ? formatAssetName(nameHex) : 'null';
    const url      = `https://adastat.net/tokens/${t.unit}`;
    return `<div style="font-size:10.5px; color:var(--amber); font-family:var(--mono); margin-top:2px; word-break:break-all;">
      ${qty} <a href="${url}" target="_blank" rel="noopener" style="color:var(--amber); text-decoration:underline;">${escHtml(name)}</a>
      <span style="color:var(--muted); font-size:9.5px; display:block;">${policyId}</span>
    </div>`;
  }).join('');
}

function utxoRows(list, txHash, side) {
  if (!list || list.length === 0) return '<span style="color:var(--muted);font-size:12px">—</span>';
  const needsCollapse = list.length > COLLAPSE_THRESHOLD;
  const rows = list.map((u, i) => {
    const addr   = u.address || '';
    const ada    = u.amount?.find(a => a.unit === 'lovelace');
    const adaVal = ada ? fmt(parseInt(ada.quantity) / 1_000_000) + ' ₳' : '—';
    const lbl    = labels.get(addr);
    const chipHtml = lbl ? `<span class="label-chip ${lbl.color}">${escHtml(lbl.name)}</span> ` : '';
    const hiddenClass = needsCollapse && i >= COLLAPSE_THRESHOLD ? ' hidden' : '';
    return `<div class="utxo-entry${hiddenClass}">
      <div class="utxo-top">${chipHtml}<span class="utxo-ada">${adaVal}</span></div>
      ${tokenRows(u.amount)}
      <div class="utxo-addr" data-addr="${escHtml(addr)}">${escHtml(addr)}</div>
    </div>`;
  }).join('');
  const expandBtn = needsCollapse
    ? `<button class="utxo-expand-btn" data-hash="${txHash}" data-side="${side}" data-expanded="false">
        Show ${list.length - COLLAPSE_THRESHOLD} more ▾
       </button>`
    : '';
  return `<div class="utxo-list">${rows}${expandBtn}</div>`;
}

function renderTable() {
  if (!allTxs.length) return;
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = allTxs.slice(start, start + PAGE_SIZE);
  document.getElementById('tx-body').innerHTML = page.map(tx => `
    <tr>
      <td class="hash-cell col-hash">
        <a href="https://cardanoscan.io/transaction/${tx.hash}" target="_blank" rel="noopener">
          ${tx.hash.slice(0, 8)}…${tx.hash.slice(-6)}
        </a>
        <button class="trade-add-btn${trades.has(tx.hash) ? ' active' : ''}" data-hash="${tx.hash}" title="${trades.has(tx.hash) ? 'Remove from trades' : 'Add to trades'}">${trades.has(tx.hash) ? '✓' : '+'}</button>
      </td>
      <td class="col-inputs">
        <div class="utxo-col-label">Inputs</div>
        ${utxoRows(tx.inputs, tx.hash, 'inputs')}
      </td>
      <td class="col-outputs">
        <div class="utxo-col-label">Outputs</div>
        ${utxoRows(tx.outputs, tx.hash, 'outputs')}

}

function renderPagination() {
  const total = Math.ceil(allTxs.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  pg.innerHTML = `
    <button class="btn btn-ghost" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>
    <span>Page ${currentPage} of ${total}</span>
    <button class="btn btn-ghost" onclick="goPage(${currentPage + 1})" ${currentPage === total ? 'disabled' : ''}>Next →</button>
  `;
}

function goPage(p) { currentPage = p; renderTable(); window.scrollTo({ top: 0 }); }

function exportCSV() {
  const rows = [['TX Hash', 'Block', 'Input Label', 'Input Address', 'Input ADA', 'Output Label', 'Output Address', 'Output ADA']];
  allTxs.forEach(tx => {
    const maxLen = Math.max(tx.inputs.length, tx.outputs.length, 1);
    for (let i = 0; i < maxLen; i++) {
      const inp = tx.inputs[i];
      const out = tx.outputs[i];
      const inAda  = inp ? fmt(lovelace(inp.amount?.find(a=>a.unit==='lovelace')?.quantity || 0), 6) : '';
      const outAda = out ? fmt(lovelace(out.amount?.find(a=>a.unit==='lovelace')?.quantity || 0), 6) : '';
      rows.push([
        i === 0 ? tx.hash  : '',
        i === 0 ? tx.block : '',
        inp ? (labels.get(inp.address)?.name || '') : '',
        inp ? inp.address : '',
        inAda,
        out ? (labels.get(out.address)?.name || '') : '',
        out ? out.address : '',
        outAda
      ]);
    }
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = 'cardano-transactions.csv';
  a.click();
}

function toggleTrade(hash) {
  if (trades.has(hash)) {
    trades.delete(hash);
    portfolio.delete(hash);
    renderTrades();
    rebuildPortfolioRows();
  } else {
    const tx = allTxs.find(t => t.hash === hash);
    if (tx) {
      trades.set(hash, tx);
      const dateStr = new Date(tx.time * 1000).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

      // auto-fill from UTxO data
      const { adaNet, tokenNet } = calcTxNet(tx);
      const adaDeposit  = adaNet > 0 ? adaNet  : 0;
      const adaWithdraw = adaNet < 0 ? -adaNet : 0;

      const tokens = [...tokenNet.entries()].map(([unit, net]) => ({
        deposit:       net > 0 ? net  : 0,
        withdraw:      net < 0 ? -net : 0,
        tokenPriceAda: 0,
        unit
      }));

      portfolio.set(hash, { date: dateStr, adaDeposit, adaWithdraw, adaPrice: 0, tokens });
      renderTrades();
      rebuildPortfolioRows();

  const btn = document.querySelector(`.trade-add-btn[data-hash="${hash}"]`);
  if (btn) {
    btn.textContent = trades.has(hash) ? '✓' : '+';
    btn.classList.toggle('active', trades.has(hash));
  }

// Compute ADA and token net for "My Wallet" addresses in a tx
function calcTxNet(tx) {
  const myWalletAddrs = new Set(
    [...labels.entries()].filter(([,v]) => v.name === 'My Wallet').map(([k]) => k)
  );

  let adaIn = 0, adaOut = 0;
  const tokensIn  = new Map(); // unit -> qty
  const tokensOut = new Map();

  (tx.inputs || []).forEach(u => {
    if (!myWalletAddrs.has(u.address)) return;
    (u.amount || []).forEach(a => {
      if (a.unit === 'lovelace') adaIn += parseInt(a.quantity);
      else tokensIn.set(a.unit, (tokensIn.get(a.unit) || 0) + parseInt(a.quantity));
    });
  });
  (tx.outputs || []).forEach(u => {
    if (!myWalletAddrs.has(u.address)) return;
    (u.amount || []).forEach(a => {
      if (a.unit === 'lovelace') adaOut += parseInt(a.quantity);
      else tokensOut.set(a.unit, (tokensOut.get(a.unit) || 0) + parseInt(a.quantity));
    });
  });

  const adaNet = (adaOut - adaIn) / 1_000_000;
  const tokenNet = new Map();
  const allUnits = new Set([...tokensIn.keys(), ...tokensOut.keys()]);
  allUnits.forEach(unit => {
    const net = (tokensOut.get(unit) || 0) - (tokensIn.get(unit) || 0);
    if (net !== 0) tokenNet.set(unit, net);
  });

  return { adaNet, tokenNet };
}

// Light update — only touches running total spans and USD spans, never inputs
function updatePortfolioTotals() {
  const sidebar = document.getElementById('portfolio-sidebar');
  if (!portfolio.size) { sidebar.style.display = 'none'; return; }

  let runNet = 0, totalRunDep = 0, totalRunWith = 0;

  [...trades.keys()].filter(h => portfolio.has(h)).forEach(hash => {
    const p   = portfolio.get(hash);
    const row = document.querySelector(`.pt-row[data-hash="${hash}"]`);

    // ADA net for this event
    let eventDep  = p.adaDeposit;
    let eventWith = p.adaWithdraw;

    // Add token contributions converted to ADA
    (p.tokens || []).forEach(t => {
      eventDep  += t.deposit  * (t.tokenPriceAda || 0);
      eventWith += t.withdraw * (t.tokenPriceAda || 0);
    });

    totalRunDep  += eventDep;
    totalRunWith += eventWith;
    runNet = totalRunDep - totalRunWith;

    if (row) {
      const runSpan = row.querySelector('.pt-running');
      const usdSpan = row.querySelector('.pt-usd-event');
      const netColor = runNet >= 0 ? 'var(--accent)' : 'var(--red)';
      runSpan.textContent = (runNet >= 0 ? '= +' : '= ') + fmt(runNet, 4);
      runSpan.style.color = netColor;

      if (p.adaPrice > 0) {
        const usd = runNet * p.adaPrice;
        usdSpan.textContent = '$ ' + fmt(usd, 2);
        usdSpan.style.color = netColor;
        usdSpan.style.display = 'block';
      } else {
        usdSpan.style.display = 'none';
      }
    }
  });

  document.getElementById('pt-deposited').textContent = fmt(totalRunDep, 4);
  document.getElementById('pt-withdrawn').textContent = fmt(totalRunWith, 4);
  const netEl = document.getElementById('pt-net');
  netEl.textContent = (runNet >= 0 ? '+' : '') + fmt(runNet, 4);
  netEl.style.color = runNet >= 0 ? 'var(--accent)' : 'var(--red)';
  document.getElementById('pt-usd-row').style.display = 'none';
}

// Single delegated input listener — never re-renders DOM
document.getElementById('portfolio-list').addEventListener('input', e => {
  const input = e.target.closest('input[data-hash]');
  if (!input) return;
  const hash  = input.dataset.hash;
  const tidx  = input.dataset.tidx;
  const field = input.dataset.field;
  const entry = portfolio.get(hash);
  if (!entry) return;
  if (tidx !== undefined) {
    const t = entry.tokens[parseInt(tidx)];
    if (t) t[field] = parseFloat(input.value) || 0;
  } else {
    if (field === 'date') entry.date = input.value;
    else entry[field] = parseFloat(input.value) || 0;
  }
  updatePortfolioTotals();
});

// Click delegation for add-token and remove-token buttons
document.getElementById('portfolio-list').addEventListener('click', e => {
  const addBtn = e.target.closest('[data-add-token]');
  if (addBtn) { addToken(addBtn.dataset.addToken); return; }

  const removeBtn = e.target.closest('[data-remove-token]');
  if (removeBtn) {
    const hash = removeBtn.dataset.hash;
    const idx  = parseInt(removeBtn.dataset.tidx);
    const p    = portfolio.get(hash);
    if (!p) return;
    p.tokens.splice(idx, 1);
    // Re-index remaining token rows
    const container = document.querySelector(`.pt-row[data-hash="${hash}"] .pt-tokens`);
    container.querySelectorAll('.pt-token-row').forEach((row, i) => {
      if (i === idx) { row.remove(); return; }
    });
    // Rebuild just the tokens section to fix indices
    const row = document.querySelector(`.pt-row[data-hash="${hash}"]`);
    if (row) {
      const tokensEl = row.querySelector('.pt-tokens');
      tokensEl.innerHTML = p.tokens.map((t, i) => `<div class="pt-token-row" data-hash="${hash}" data-tidx="${i}">${tokenRowHTML(hash, i, t)}</div>`).join('');
    }
    updatePortfolioTotals();
  }
});

    const date  = new Date(tx.time * 1000).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    const short = tx.hash.slice(0, 8) + '…' + tx.hash.slice(-6);
    return `<div style="margin-bottom:0.75rem; padding-bottom:0.75rem; border-bottom:1px solid var(--border);">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:4px;">
        <a href="https://cardanoscan.io/transaction/${tx.hash}" target="_blank" rel="noopener"
           style="font-family:var(--mono); font-size:11px; color:var(--blue); text-decoration:none;">${short}</a>
        <button onclick="toggleTrade('${tx.hash}')"
          style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; padding:0; line-height:1;" title="Remove">✕</button>
      </div>
      <div style="font-size:11px; color:var(--muted); margin-top:2px;">${date}</div>
    </div>`;
  }).join('');
}

document.getElementById('stake').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchAccount();
});

// Event delegation — catches clicks on any .utxo-addr, .trade-add-btn, .utxo-expand-btn
document.getElementById('tx-body').addEventListener('click', e => {
  const addr = e.target.closest('.utxo-addr');
  if (addr) { openPopup(addr.dataset.addr); return; }

  const tradeBtn = e.target.closest('.trade-add-btn');
  if (tradeBtn) { toggleTrade(tradeBtn.dataset.hash); return; }

  const expandBtn = e.target.closest('.utxo-expand-btn');
  if (expandBtn) {
    const expanded = expandBtn.dataset.expanded === 'true';
    const hash = expandBtn.dataset.hash;
    const side = expandBtn.dataset.side;
    const tx   = allTxs.find(t => t.hash === hash);
    if (!tx) return;
    const count = side === 'inputs' ? tx.inputs.length : tx.outputs.length;
    // find the parent utxo-list and toggle hidden entries
    const list = expandBtn.closest('.utxo-list');
    list.querySelectorAll('.utxo-entry').forEach((el, i) => {
      if (i >= COLLAPSE_THRESHOLD) el.classList.toggle('hidden', expanded);
    });
    expandBtn.dataset.expanded = !expanded;
    expandBtn.textContent = expanded
      ? `Show ${count - COLLAPSE_THRESHOLD} more ▾`
      : `Show less ▴`;
  }
});
</script>
</body>
</html>
