<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Project</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f172a; color: #f1f5f9; }
    header { text-align: center; padding: 80px 20px 40px; }
    header h1 { font-size: 3rem; margin-bottom: 16px; }
    header p { font-size: 1.2rem; color: #94a3b8; max-width: 500px; margin: 0 auto 32px; }
    .btn { background: #6366f1; color: white; padding: 14px 28px;
           border-radius: 8px; text-decoration: none; font-size: 1rem; }
    .btn:hover { background: #4f46e5; }
    section { max-width: 800px; margin: 60px auto; padding: 0 20px; }
    section h2 { font-size: 1.8rem; margin-bottom: 20px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .card { background: #1e293b; padding: 24px; border-radius: 12px; }
    .card h3 { margin-bottom: 8px; }
    .card p { color: #94a3b8; font-size: 0.95rem; }
    footer { text-align: center; padding: 40px; color: #475569; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1>My Project</h1>
    <p>A short description of what your project does and why it matters.</p>
    <a href="#features" class="btn">Learn More</a>
  </header>

  <section id="features">
    <h2>Features</h2>
    <div class="cards">
      <div class="card">
        <h3>⚡ Fast</h3>
        <p>Describe your first feature here.</p>
      </div>
      <div class="card">
        <h3>🔒 Secure</h3>
        <p>Describe your second feature here.</p>
      </div>
      <div class="card">
        <h3>🎯 Simple</h3>
        <p>Describe your third feature here.</p>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 My Project. All rights reserved.</p>
  </footer>
</body>
</html>
